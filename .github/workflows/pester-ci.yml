name: PowerShell Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint PowerShell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src -Recurse -Severity Warning,Error
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found $($results.Count) issue(s)"
          }
          Write-Host "No lint issues found."

  test:
    name: Pester Tests
    runs-on: ubuntu-latest
    needs: [ lint ]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -Force -SkipPublisherCheck

      - name: Create TestResults directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path ./TestResults -Force | Out-Null

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = & "./pester.config.ps1"
          Invoke-Pester -Configuration $config

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Pester Test Results
          path: ./TestResults/test-results.xml
          reporter: dotnet-nunit

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./TestResults/coverage.xml
          retention-days: 14

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Dashboard
        if: always()
        run: |
          reportgenerator \
            -reports:./TestResults/coverage.xml \
            -targetdir:./TestResults/CoverageReport \
            -reporttypes:"Html;HtmlChart;MarkdownSummaryGithub" \
            -sourcedirs:./src

      - name: Upload Coverage Dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-dashboard
          path: ./TestResults/CoverageReport
          retention-days: 14

      - name: Post Coverage to Job Summary
        if: always()
        shell: bash
        run: cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY